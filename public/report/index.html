<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
          const mode = localStorage.getItem('theme-mode') || 'system';
          let theme = mode;
          if (mode === 'system') theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <title>Trend Report | GlobalTrendUp</title>
    <meta name="description" content="Global real-time trend reports and AI-powered deep analysis.">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="../" class="logo">GlobalTrendUp</a>
            <nav id="report-type-nav">
                <button class="nav-btn" data-type="weekly">Weekly</button>
                <button class="nav-btn" data-type="monthly">Monthly</button>
                <button class="nav-btn" data-type="yearly">Yearly</button>
            </nav>
            <div class="header-right">
                <div class="theme-menu">
                    <button id="theme-menu-toggle" class="theme-menu-btn" aria-label="Select Theme">
                        <span class="theme-trigger-icon"></span>
                    </button>
                    <div id="theme-dropdown" class="theme-dropdown hidden">
                        <button class="theme-opt" data-theme="light">
                            <span class="opt-icon sun-svg"></span>
                            <span class="opt-label">Light</span>
                        </button>
                        <button class="theme-opt" data-theme="dark">
                            <span class="opt-icon moon-svg"></span>
                            <span class="opt-label">Dark</span>
                        </button>
                        <button class="theme-opt" data-theme="system">
                            <span class="opt-icon system-svg"></span>
                            <span class="opt-label">System</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="report-wrapper container">
        <aside id="report-sidebar">
            <div class="sidebar-section">
                <h3>Weekly Reports</h3>
                <div id="sidebar-weekly" class="history-list"></div>
                <button class="more-btn" onclick="toggleCategory('weekly')" title="Show all">
                    <span>+</span>
                </button>
            </div>
            <div class="sidebar-section">
                <h3>Monthly Reports</h3>
                <div id="sidebar-monthly" class="history-list"></div>
                <button class="more-btn" onclick="toggleCategory('monthly')" title="Show all">
                    <span>+</span>
                </button>
            </div>
            <div class="sidebar-section">
                <h3>Yearly Reports</h3>
                <div id="sidebar-yearly" class="history-list"></div>
                <button class="more-btn" onclick="toggleCategory('yearly')" title="Show all">
                    <span>+</span>
                </button>
            </div>
        </aside>

        <article id="report-main">
            <header class="report-header-stack">
                <div class="report-meta-top">
                    <span id="country-badge" class="country-pill">...</span>
                    <span class="separator">•</span>
                    <span id="report-date-range" class="date-text">...</span>
                    <span class="separator">•</span>
                    <span class="reading-time">3 min read</span>
                </div>
                <h1 id="report-title-text" class="editorial-title">Trend Analysis</h1>
                <div class="byline">Post by <strong>GlobalTrendUp Research</strong></div>
            </header>

            <section id="report-hero-visual">
                <div id="chart-container" class="intensity-viz">
                    <div class="viz-label">Trend Intensity Level</div>
                    <div id="bar-chart" class="bar-chart"></div>
                </div>
            </section>

            <section id="lead-summary" class="blog-summary">
                <!-- AI Narrative Summary will be injected here -->
            </section>

            <section id="depth-analysis">
                <div id="top-rank-1" class="depth-card primary-card">
                    <div class="card-rank">#1</div>
                    <div class="card-content">
                        <h2 class="keyword">...</h2>
                        <div class="analysis-text">...</div>
                        <div class="supplementary">
                            <h4>Related Insights</h4>
                            <div class="news-list"></div>
                            <div class="video-grid"></div>
                        </div>
                    </div>
                </div>

                <div id="top-rank-2" class="depth-card secondary-card">
                    <div class="card-rank">#2</div>
                    <div class="card-content">
                        <h2 class="keyword">...</h2>
                        <div class="analysis-text">...</div>
                        <div class="supplementary">
                            <div class="news-list"></div>
                            <div class="video-grid"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="simple-analysis">
                <div class="grid-345">
                     <!-- 3, 4, 5 will be injected here -->
                </div>
            </section>
        </article>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 GlobalTrendUp. (v3.1.83) Powered by Analytical Intelligence.</p>
        </div>
    </footer>

    <script type="module" src="report.js"></script>
</body>
</html>
