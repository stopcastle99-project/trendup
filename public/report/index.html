<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
          const mode = localStorage.getItem('theme-mode') || 'system';
          let theme = mode;
          if (mode === 'system') theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <title>Trend Report | GlobalTrendUp</title>
    <meta name="description" content="Global real-time trend reports and AI-powered deep analysis.">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="../" class="logo">GlobalTrendUp</a>
            <div id="global-title" class="report-main-title">Global Trend Report</div>
            <div class="header-right">
                <div class="country-selector">
                    <button class="country-btn" data-country="KR" title="South Korea">🇰🇷</button>
                    <button class="country-btn" data-country="US" title="United States">🇺🇸</button>
                    <button class="country-btn" data-country="JP" title="Japan">🇯🇵</button>
                </div>
                <div class="theme-menu">
                    <button id="theme-menu-toggle" class="theme-menu-btn" aria-label="Select Theme">
                        <span class="theme-trigger-icon"></span>
                    </button>
                    <div id="theme-dropdown" class="theme-dropdown hidden">
                        <button class="theme-opt" data-theme="light">
                            <span class="opt-icon sun-svg"></span>
                            <span class="opt-label">Light</span>
                        </button>
                        <button class="theme-opt" data-theme="dark">
                            <span class="opt-icon moon-svg"></span>
                            <span class="opt-label">Dark</span>
                        </button>
                        <button class="theme-opt" data-theme="system">
                            <span class="opt-icon system-svg"></span>
                            <span class="opt-label">System</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="report-wrapper container">
        <aside id="report-sidebar">
            <div class="sidebar-top-nav">
                <button class="period-btn active" data-type="weekly">주간</button>
                <button class="period-btn" data-type="monthly">월간</button>
                <button class="period-btn" data-type="yearly">년간</button>
            </div>

            <div class="sidebar-history">
                <div class="history-header">
                    <span class="history-label">현재 기간</span>
                    <button id="history-toggle" class="history-plus-btn">+</button>
                </div>
                <div id="current-period-display" class="current-period-value">...</div>
                <div id="history-dropdown-list" class="history-dropdown hidden">
                    <!-- Past reports will be injected here -->
                </div>
            </div>

            <div class="sidebar-stats">
                <div class="stat-card">
                    <span class="stat-label">총 조회수</span>
                    <div class="stat-value">8.2M</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">평균 성장률</span>
                    <div class="stat-value growth">+7.4%</div>
                </div>
            </div>
        </aside>

        <article id="report-main">
            <div class="main-period-section">
                <div class="stat-card main-highlight-card">
                    <span class="stat-label">집계기간</span>
                    <div id="current-period-summary" class="stat-value">...</div>
                </div>
            </div>

            <div id="trend-list" class="trend-list-container">
                <!-- All 5 ranks will be injected here using a consistent card style -->
                <div class="loading-state">기다려주세요...</div>
            </div>
        </article>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 GlobalTrendUp. (v3.3.4) Powered by Analytical Intelligence.</p>
        </div>
    </footer>

    <script type="module" src="/report/report.js?v=3.2.19"></script>
</body>
</html>
