<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            const mode = localStorage.getItem('theme-mode') || 'system';
            let theme = mode;
            if (mode === 'system') theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <title>Trend Report | GlobalTrendUp</title>
    <meta name="description" content="Global real-time trend reports and AI-powered deep analysis.">
    <meta property="og:title" content="Trend Report | GlobalTrendUp">
    <meta property="og:description" content="Global real-time trend reports and AI-powered deep analysis.">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1388346009777764" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
</head>

<body>
    <header>
        <div class="container header-content">
            <a href="../" class="logo-home-link" title="Home"><span class="home-svg"></span></a>
            <div id="global-title" class="report-main-title">Trend Report</div>
            <div class="header-right">
                <div class="country-dropdown">
                    <button id="country-dropdown-toggle" class="country-dropdown-btn" aria-label="Select Country">
                        <span id="current-country-flag" class="country-trigger-flag"></span>
                    </button>
                    <div id="country-dropdown-menu" class="country-dropdown-list hidden">
                        <button class="country-opt" data-country="KR">
                            <span class="opt-flag">🇰🇷</span>
                            <span class="opt-label">South Korea</span>
                        </button>
                        <button class="country-opt" data-country="US">
                            <span class="opt-flag">🇺🇸</span>
                            <span class="opt-label">United States</span>
                        </button>
                        <button class="country-opt" data-country="JP">
                            <span class="opt-flag">🇯🇵</span>
                            <span class="opt-label">Japan</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="report-wrapper container">
        <aside id="report-sidebar">
            <div class="sidebar-top-nav">
                <button class="period-btn active" data-type="weekly">Weekly</button>
                <button class="period-btn" data-type="monthly">Monthly</button>
                <button class="period-btn" data-type="yearly">Yearly</button>
            </div>

            <div class="sidebar-history">
                <div class="history-header">
                    <span class="sidebar-label">Current Period</span>
                    <button id="history-toggle" class="history-plus-btn">+</button>
                </div>
                <div id="current-period-display" class="current-period-value">...</div>
                <div id="history-dropdown-list" class="history-dropdown hidden">
                    <!-- Past reports will be injected here -->
                </div>
            </div>

            <div class="sidebar-stats">
                <div class="stat-card">
                    <span class="stat-label">Total Views</span>
                    <div class="stat-value">8.2M+</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Avg Growth</span>
                    <div class="stat-value growth">+15.4%</div>
                </div>
            </div>

            <div class="ad-container sidebar-ad-container">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-1388346009777764"
                     data-ad-slot="1234567890"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </aside>

        <article id="report-main">
            <div class="breadcrumb">
                <a href="../">Home</a> &gt; <span>Trend Report</span> &gt; <span id="breadcrumb-current-period">Weekly</span>
            </div>

            <div class="ad-container banner-ad-container">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-1388346009777764"
                     data-ad-slot="1234567890"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>

            <div class="main-period-section">
                <div class="stat-card main-highlight-card">
                    <span class="stat-label">Aggregation Period</span>
                    <div id="current-period-summary" class="stat-value">...</div>
                </div>
            </div>

            <div id="trend-list" class="trend-list-container">
                <!-- All 5 ranks will be injected here using a consistent card style -->
                <div class="loading-state">Please wait...</div>
            </div>

            <div class="ad-container banner-ad-container bottom-ad-container">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-1388346009777764"
                     data-ad-slot="1234567890"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </article>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 GlobalTrendUp. All rights reserved. (v3.4.68) Powered by Analytical Intelligence.</p>
                <ul class="footer-links">
                    <li><a href="../index.html" class="info-link" data-page="about">About Us</a></li>
                    <li><a href="../index.html" class="info-link" data-page="privacy">Privacy Policy</a></li>
                    <li><a href="../index.html" class="info-link" data-page="terms">Terms of Service</a></li>
                    <li><a href="../index.html" class="info-link" data-page="contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script type="module" src="/report/report.js?v=3.4.68"></script>
</body>

</html>
