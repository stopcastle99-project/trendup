name: Scheduled Trend Update

on:
  workflow_dispatch:
  schedule:
    - cron: '45 * * * *' # 매시간 45분에 실행 (AdSense 등을 고려한 분산)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true

permissions:
  contents: write

jobs:
  update-trends:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        run: npm install

      - name: Run Update Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > gcp-key.json
          export GOOGLE_APPLICATION_CREDENTIALS="${PWD}/gcp-key.json"
          node update-trends.js

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="${PWD}/gcp-key.json"
          if [ -n "$FIREBASE_TOKEN" ]; then
            npx firebase-tools deploy --only hosting,firestore:rules --token "$FIREBASE_TOKEN"
          else
            npx firebase-tools deploy --only hosting,firestore:rules
          fi
          rm gcp-key.json

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: schedule trend update"
          branch: main

