<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      const mode = localStorage.getItem('theme-mode') || 'system';
      let theme = mode;
      if (mode === 'system') theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | GlobalTrendUp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

</head>

      <div>

          <ul class="footer-links" style="display:flex; justify-content:center; gap:1.5rem; list-style:none; padding:0; margin-top:1rem;">

            <li><a href="/privacy.html" style="color:var(--text-muted); text-decoration:none; font-size:0.9rem;">Privacy Policy</a></li>
